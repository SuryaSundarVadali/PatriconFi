name: contracts-ci

on:
  push:
    paths:
      - "contracts/**"
      - ".github/workflows/ci-contracts.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/ci-contracts.yml"

jobs:
  test-contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: pytest
