name: web-ci

on:
  push:
    paths:
      - "web/**"
      - ".github/workflows/ci-web.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/ci-web.yml"

jobs:
  test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package.json
      - run: npm install
      - run: npm run typecheck
      - run: npm run build
