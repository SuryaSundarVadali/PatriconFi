name: agents-ci

on:
  push:
    paths:
      - "agents/**"
      - ".github/workflows/ci-agents.yml"
  pull_request:
    paths:
      - "agents/**"
      - ".github/workflows/ci-agents.yml"

jobs:
  test-agents:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .[dev]
      - run: pytest
