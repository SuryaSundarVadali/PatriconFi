name: contracts

'on':
  push:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"

jobs:
  contracts-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Lint (Python + Vyper compile checks)
        run: poe lint

      - name: Test (Titanoboa)
        run: poe test

      - name: Build (Vyper compile)
        run: poe build

      - name: Optional Arc RPC smoke check
        run: poe e2e
